<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ドッジボールコート作成手順</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: #f0eeea;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 12px 10px 40px;
  }
  .card {
    background: #ffffff;
    border-radius: 18px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.09);
    padding: 20px 16px 24px;
    width: 100%;
    max-width: 600px;
  }
  h1 {
    font-size: 16px;
    font-weight: 700;
    color: #1a1a18;
    line-height: 1.55;
    padding-bottom: 14px;
    border-bottom: 1.5px solid #e6e4de;
    margin-bottom: 18px;
  }
  #step-title {
    font-size: 19px;
    font-weight: 700;
    color: #1a1a18;
    margin-bottom: 8px;
    min-height: 28px;
    line-height: 1.4;
  }
  #step-desc {
    font-size: 15px;
    color: #4a4a45;
    margin-bottom: 14px;
    min-height: 44px;
    line-height: 1.75;
  }
  #stage-wrap {
    width: 100%;
    overflow: hidden;
    border-radius: 12px;
    background: #fafaf8;
    border: 1px solid #e6e4de;
  }
  #stage { width: 100%; display: block; }
  .b-line { stroke: #378ADD; stroke-width: 3; stroke-linecap: round; fill: none; }
  .r-line { stroke: #E24B4A; stroke-width: 3; stroke-linecap: round; fill: none; }
  .appear { animation: fadeIn .35s ease both; }
  @keyframes fadeIn { from { opacity:0; transform:scale(.95); } to { opacity:1; transform:scale(1); } }
  @keyframes popIn { from { opacity:0; transform:scale(.5); } to { opacity:1; transform:scale(1); } }
  @keyframes drawLine { from { stroke-dashoffset: 1; } to { stroke-dashoffset: 0; } }
  #nav {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 16px;
  }
  #nav button {
    font-family: inherit;
    font-size: 17px;
    font-weight: 700;
    padding: 14px 26px;
    border-radius: 12px;
    border: 1.5px solid #c8c6c0;
    background: #ffffff;
    color: #1a1a18;
    cursor: pointer;
    transition: background .15s, transform .1s;
    -webkit-appearance: none;
    min-width: 110px;
  }
  #nav button:active { background: #f0eeea; transform: scale(0.97); }
  #nav button:disabled { opacity: .3; cursor: default; }
  #step-counter { font-size: 15px; color: #8a8a84; margin-left: auto; font-weight: 600; }
  #dots {
    text-align: center;
    margin-top: 14px;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #ccc; transition: background .2s, transform .2s; }
  .dot.active { background: #1a1a18; transform: scale(1.25); }
</style>
</head>
<body>
<div class="card">
  <h1>バスケコートを利用したドッジボールコート作成（半面分）</h1>
  <p style="font-size:13px;color:#6b6b66;line-height:1.7;margin-bottom:16px;padding:10px 12px;background:#f5f4f0;border-radius:8px;border-left:3px solid #c8c6c0;">※ 基準点はバスケコートのセンターラインを基本とするが、体育館の状況によってバドミントンやバレーボールのラインを利用する場合もあるため、臨機応変に対応すること。</p>
  <p id="step-title"></p>
  <p id="step-desc"></p>
  <div id="stage-wrap"><svg id="stage"></svg></div>
  <div id="nav">
    <button id="btnPrev">← 前へ</button>
    <button id="btnNext">次へ →</button>
    <span id="step-counter"></span>
  </div>
  <div id="dots"></div>
</div>

<script>
const S=26, X0=62, Y0=68;
const H=13*S, VW=620, VH=Y0+H+96;
const FF="'Hiragino Kaku Gothic ProN','Hiragino Sans','Noto Sans JP',sans-serif";

function px(m){ return X0+m*S; }
function py(m){ return Y0+m*S; }

function svgEl(tag,attrs){
  const e=document.createElementNS('http://www.w3.org/2000/svg',tag);
  for(const [k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  return e;
}
function line(svg,x1,y1,x2,y2,cls,anim){
  svg.appendChild(svgEl('line',{x1,y1,x2,y2,class:cls+(anim?' '+anim:'')}));
}
// 赤線をニョロニョロと伸ばすアニメーション（Web Animations API使用）
function rline(svg,x1,y1,x2,y2,delay,duration){
  const len=Math.sqrt((x2-x1)**2+(y2-y1)**2);
  const delayMs=parseFloat(delay)*1000;
  const durMs=parseFloat(duration)*1000;
  const l=svgEl('line',{x1,y1,x2,y2,class:'r-line'});
  l.setAttribute('stroke-dasharray', len);
  l.setAttribute('stroke-dashoffset', len);
  svg.appendChild(l);
  setTimeout(()=>{
    l.animate(
      [{strokeDashoffset: len},{strokeDashoffset: 0}],
      {duration: durMs, easing:'linear', fill:'forwards'}
    );
  }, delayMs);
}
function dash(svg,x1,y1,x2,y2,stroke){
  svg.appendChild(svgEl('line',{x1,y1,x2,y2,stroke,'stroke-width':2.5,'stroke-dasharray':'6 4','stroke-linecap':'round',fill:'none'}));
}
function circ(svg,cx,cy,r,fill,anim){
  const c=svgEl('circle',{cx,cy,r,fill});
  if(anim) c.setAttribute('class',anim);
  svg.appendChild(c);
}
function circOpt(svg,cx,cy,r,stroke){
  svg.appendChild(svgEl('circle',{cx,cy,r,fill:'none',stroke,'stroke-width':2,'stroke-dasharray':'3 2'}));
}
function txt(svg,x,y,t,size,weight,anchor,fill,anim){
  const e=svgEl('text',{x,y,'text-anchor':anchor,'dominant-baseline':'central',
    'font-size':size,'font-weight':weight,'fill':fill,'font-family':FF});
  if(anim) e.setAttribute('class',anim);
  e.textContent=t; svg.appendChild(e);
}

function legend(svg){
  const ly=Y0+H+34;
  line(svg, X0, ly, X0+22, ly, 'b-line');
  txt(svg, X0+27, ly, '青：バスケライン', 16, 500, 'start', '#555550');
  line(svg, X0+185, ly, X0+207, ly, 'r-line');
  txt(svg, X0+212, ly, '赤：テープ', 16, 500, 'start', '#555550');
  const ly2=ly+22;
  circOpt(svg, X0+10, ly2, 6, '#888882');
  txt(svg, X0+27, ly2, '点線：任意マーキング', 15, 400, 'start', '#888882');
}

// 横マーキング（3m・8m・13m・16m）常時表示
function topXMarks(svg){
  [3,8,13,16].forEach(m=>{
    circ(svg, px(m), py(0), 6, '#EF9F27');
    txt(svg, px(m), Y0-20, m+'m', 18, 600, 'middle', '#888882');
  });
}
// センターラインステップ専用（0mのみ、マーキングなし）
function drawCenterLineOnly(svg){
  svg.innerHTML=''; legend(svg);
  line(svg, px(0), py(0), px(16), py(0), 'b-line');
  txt(svg, px(0), Y0-20, '0m', 18, 600, 'middle', '#888882');
}
function drawCenterOnly(svg){
  svg.innerHTML=''; legend(svg);
  line(svg, px(0), py(0), px(16), py(0), 'b-line');
  txt(svg, px(0), Y0-20, '0m', 18, 600, 'middle', '#888882');
  topXMarks(svg);
}
function drawCenterAndLeft(svg){
  svg.innerHTML=''; legend(svg);
  line(svg, px(0), py(0), px(16), py(0), 'b-line');
  line(svg, px(0), py(0), px(0), py(13), 'b-line');
  txt(svg, px(0), Y0-20, '0m', 18, 600, 'middle', '#888882');
  [0,5,10,13].forEach(m=>txt(svg, X0-14, py(m), m+'m', 18, 600, 'end', '#888882'));
  topXMarks(svg);
}
function topMarks(svg){
  circ(svg, px(0), py(0), 6, '#EF9F27');
  txt(svg, px(0), Y0-34, '基準点', 17, 700, 'middle', '#1a1a18');
  txt(svg, px(0), Y0-20, '0m', 18, 600, 'middle', '#888882');
}
function s1marks(svg){
  circ(svg, px(0), py(0), 6, '#EF9F27');
  txt(svg, px(0), Y0-34, '基準点', 17, 700, 'middle', '#1a1a18');
  txt(svg, px(0), Y0-20, '0m', 18, 600, 'middle', '#888882');
}
function s2marks(svg){
  // ②: 5m・13mは必須、10mは任意
  [5,13].forEach(m=>circ(svg, px(0), py(m), 6, '#EF9F27'));
  circOpt(svg, px(0), py(10), 6, '#EF9F27');
}
function s3(svg){
  // ③: 0〜10m赤、10m必須、13m任意
  line(svg, px(3), py(0), px(3), py(10), 'r-line');
  dash(svg, px(3), py(10), px(3), py(13), '#aaa');
  [0,5,10].forEach(m=>circ(svg, px(3), py(m), 5, '#E24B4A'));
  circOpt(svg, px(3), py(13), 5, '#aaa');
  txt(svg, px(3)-10, py(5)-14, '5m', 13, 700, 'end', '#1a1a18');
  txt(svg, px(3)-10, py(10)-14, '10m', 13, 700, 'end', '#1a1a18');
}
function s4(svg){
  // ④: 同じく10m必須、13m任意
  line(svg, px(13), py(0), px(13), py(10), 'r-line');
  dash(svg, px(13), py(10), px(13), py(13), '#aaa');
  [0,5,10].forEach(m=>circ(svg, px(13), py(m), 5, '#E24B4A'));
  circOpt(svg, px(13), py(13), 5, '#aaa');
  txt(svg, px(13)+10, py(5)-14, '5m', 13, 700, 'start', '#1a1a18');
  txt(svg, px(13)+10, py(10)-14, '10m', 13, 700, 'start', '#1a1a18');
}
function s5(svg){
  // ⑤: 5〜13m赤、10m任意
  dash(svg, px(16), py(0), px(16), py(5), '#aaa');
  line(svg, px(16), py(5), px(16), py(13), 'r-line');
  [5,13].forEach(m=>circ(svg, px(16), py(m), 5, '#E24B4A'));
  circOpt(svg, px(16), py(10), 5, '#aaa');
  txt(svg, px(16)+10, py(5)-14, '5m', 13, 700, 'start', '#1a1a18');
  txt(svg, px(16)+10, py(13)-14, '13m', 13, 700, 'start', '#1a1a18');
}
function s6(svg){
  line(svg, px(0), py(5), px(3), py(5), 'r-line');
  line(svg, px(13), py(5), px(16), py(5), 'r-line');
}
function s7(svg){
  line(svg, px(3), py(10), px(13), py(10), 'r-line');
}

const steps=[
  {
    title:'センターライン',
    desc:'バスケコートのセンターライン（青線）を基準にコートを作成する。センターライン左端が基準点。',
    draw(svg){
      drawCenterLineOnly(svg);
      circ(svg, px(0), py(0), 6, '#EF9F27', 'appear');
      txt(svg, px(0), Y0-34, '基準点', 17, 700, 'middle', '#1a1a18', 'appear');
    }
  },
  {
    title:'① 横方向にマーキング（3m・8m・13m・16m）',
    desc:'センターライン左端（基準点）から横に3m・8m・13m・16mの位置にマーキング。8mはセンターサークル中心の目安。',
    draw(svg){
      // topXMarksを呼ばないベースを使用
      drawCenterLineOnly(svg);
      // 0m基準点はアニメーションなし
      circ(svg, px(0), py(0), 6, '#EF9F27');
      txt(svg, px(0), Y0-34, '基準点', 17, 700, 'middle', '#1a1a18');
      txt(svg, px(0), Y0-20, '0m', 18, 600, 'middle', '#888882');
      // 3m・8m・13m・16m を順番に点灯
      [3,8,13,16].forEach((m,i)=>{
        const delay=(i*0.25)+'s';
        const c=svgEl('circle',{cx:px(m),cy:py(0),r:6,fill:'#EF9F27'});
        c.style.cssText=`animation:popIn .3s ease both;animation-delay:${delay}`;
        svg.appendChild(c);
        const t=svgEl('text',{x:px(m),y:Y0-16,'text-anchor':'middle','dominant-baseline':'central',
          'font-size':18,'font-weight':600,'fill':'#888882','font-family':FF});
        t.textContent=m+'m';
        t.style.cssText=`animation:popIn .3s ease both;animation-delay:${delay}`;
        svg.appendChild(t);
      });
    }
  },
  {
    title:'② 基準点から縦方向にマーキング（5m・10m・13m）',
    desc:'基準点から縦（奥行き方向）に5m・13mをマーキング。10mは任意。バスケのサイドラインを利用するためテープは貼らない。',
    draw(svg){
      drawCenterAndLeft(svg); topMarks(svg);
      // 5m→10m→13m の順に点灯
      [[5,'#EF9F27',false],[10,'#aaa',true],[13,'#EF9F27',false]].forEach(([m,stroke,opt],i)=>{
        const delay=(i*0.25)+'s';
        const c=opt
          ? svgEl('circle',{cx:px(0),cy:py(m),r:6,fill:'none',stroke,'stroke-width':2,'stroke-dasharray':'3 2'})
          : svgEl('circle',{cx:px(0),cy:py(m),r:6,fill:stroke});
        c.style.cssText=`animation:popIn .3s ease both;animation-delay:${delay}`;
        svg.appendChild(c);
      });
      const nt=svgEl('text',{x:px(0)+12,y:py(6.5),'text-anchor':'start','dominant-baseline':'central','font-size':13,'font-weight':500,'fill':'#888882','font-family':FF});
      nt.textContent='バスケライン使用のためテープ不要';
      nt.style.cssText='animation:popIn .3s ease both;animation-delay:0.75s';
      svg.appendChild(nt);
    }
  },
  {
    title:'③ 3m縦ライン：テープを貼る（y=0〜10m）',
    desc:'センターライン3m位置から縦に5m・10m・13mへマーキング。y=0〜10mの範囲にテープ（赤）を貼る。13mは任意。',
    draw(svg){
      drawCenterAndLeft(svg); s1marks(svg); s2marks(svg);
      rline(svg, px(3),py(0), px(3),py(10), '0s', '2.5s');
      const dl=svgEl('line',{x1:px(3),y1:py(10),x2:px(3),y2:py(13),stroke:'#aaa','stroke-width':2.5,'stroke-dasharray':'6 4','stroke-linecap':'round'}); dl.style.cssText='animation:popIn .3s ease both;animation-delay:0.5s'; svg.appendChild(dl);
      [0,5,10].forEach((m,i)=>{ const c=svgEl('circle',{cx:px(3),cy:py(m),r:5,fill:'#E24B4A'}); c.style.cssText=`animation:popIn .3s ease both;animation-delay:${0.55+i*0.15}s`; svg.appendChild(c); });
      const c13=svgEl('circle',{cx:px(3),cy:py(13),r:5,fill:'none',stroke:'#aaa','stroke-width':2,'stroke-dasharray':'3 2'}); c13.style.cssText='animation:popIn .3s ease both;animation-delay:1.0s'; svg.appendChild(c13);
      const mkL=(x,y,t,anchor,delay)=>{const e=svgEl('text',{x,y,'text-anchor':anchor,'dominant-baseline':'central','font-size':17,'font-weight':700,'fill':'#1a1a18','font-family':FF});e.textContent=t;e.style.cssText=`animation:popIn .3s ease both;animation-delay:${delay}`;svg.appendChild(e);};
      mkL(px(3)-10, py(5)-14, '5m', 'end', '0.7s');
      mkL(px(3)-10, py(10)-14, '10m', 'end', '0.85s');
    }
  },
  {
    title:'④ 13m縦ライン：テープを貼る（y=0〜10m）',
    desc:'センターライン13m位置から縦に同様にマーキング。y=0〜10mの範囲にテープを貼る。13mは任意。',
    draw(svg){
      drawCenterAndLeft(svg); s1marks(svg); s2marks(svg); s3(svg);
      rline(svg, px(13),py(0), px(13),py(10), '0s', '2.5s');
      const dl=svgEl('line',{x1:px(13),y1:py(10),x2:px(13),y2:py(13),stroke:'#aaa','stroke-width':2.5,'stroke-dasharray':'6 4','stroke-linecap':'round'}); dl.style.cssText='animation:popIn .3s ease both;animation-delay:0.5s'; svg.appendChild(dl);
      [0,5,10].forEach((m,i)=>{ const c=svgEl('circle',{cx:px(13),cy:py(m),r:5,fill:'#E24B4A'}); c.style.cssText=`animation:popIn .3s ease both;animation-delay:${0.55+i*0.15}s`; svg.appendChild(c); });
      const c13=svgEl('circle',{cx:px(13),cy:py(13),r:5,fill:'none',stroke:'#aaa','stroke-width':2,'stroke-dasharray':'3 2'}); c13.style.cssText='animation:popIn .3s ease both;animation-delay:1.0s'; svg.appendChild(c13);
      const mkL=(x,y,t,anchor,delay)=>{const e=svgEl('text',{x,y,'text-anchor':anchor,'dominant-baseline':'central','font-size':17,'font-weight':700,'fill':'#1a1a18','font-family':FF});e.textContent=t;e.style.cssText=`animation:popIn .3s ease both;animation-delay:${delay}`;svg.appendChild(e);};
      mkL(px(13)+10, py(5)-14, '5m', 'start', '0.7s');
      mkL(px(13)+10, py(10)-14, '10m', 'start', '0.85s');
    }
  },
  {
    title:'⑤ 16m縦ライン：テープを貼る（y=5〜13m）',
    desc:'センターライン16m位置にマーキング。テープはy=5〜13mの範囲に貼る。10mは任意。',
    draw(svg){
      drawCenterAndLeft(svg); s1marks(svg); s2marks(svg); s3(svg); s4(svg);
      const dl=svgEl('line',{x1:px(16),y1:py(0),x2:px(16),y2:py(5),stroke:'#aaa','stroke-width':2.5,'stroke-dasharray':'6 4','stroke-linecap':'round'}); dl.style.cssText='animation:popIn .3s ease both;animation-delay:0s'; svg.appendChild(dl);
      rline(svg, px(16),py(5), px(16),py(13), '0.2s', '2.5s');
      [[5,false],[10,true],[13,false]].forEach(([m,opt],i)=>{
        const c=opt ? svgEl('circle',{cx:px(16),cy:py(m),r:5,fill:'none',stroke:'#aaa','stroke-width':2,'stroke-dasharray':'3 2'}) : svgEl('circle',{cx:px(16),cy:py(m),r:5,fill:'#E24B4A'});
        c.style.cssText=`animation:popIn .3s ease both;animation-delay:${0.7+i*0.15}s`; svg.appendChild(c);
      });
      const mkL=(x,y,t,delay)=>{const e=svgEl('text',{x,y,'text-anchor':'start','dominant-baseline':'central','font-size':17,'font-weight':700,'fill':'#1a1a18','font-family':FF});e.textContent=t;e.style.cssText=`animation:popIn .3s ease both;animation-delay:${delay}`;svg.appendChild(e);};
      mkL(px(16)+10, py(5)-14, '5m', '0.7s');
      mkL(px(16)+10, py(13)-14, '13m', '1.0s');
    }
  },
  {
    title:'⑥ 5mラインにテープを貼る',
    desc:'y=5mの位置に左右それぞれ3mずつテープを貼る。',
    draw(svg){
      drawCenterAndLeft(svg); s1marks(svg); s2marks(svg); s3(svg); s4(svg); s5(svg);
      rline(svg, px(0),py(5), px(3),py(5), '0s', '1.5s');
      rline(svg, px(13),py(5), px(16),py(5), '1.5s', '1.5s');
    }
  },
  {
    title:'⑦ 10mラインにテープを貼る',
    desc:'y=10mの横ライン（x=3〜13m）にテープを貼る。',
    draw(svg){
      drawCenterAndLeft(svg); s1marks(svg); s2marks(svg); s3(svg); s4(svg); s5(svg); s6(svg);
      rline(svg, px(3),py(10), px(13),py(10), '0s', '2.5s');
    }
  },
  {
    title:'⑧ 13mラインにテープを貼る（完成）',
    desc:'y=13mの横ライン全幅にテープを貼って完成。',
    draw(svg){
      drawCenterAndLeft(svg); s1marks(svg); s2marks(svg); s3(svg); s4(svg); s5(svg); s6(svg); s7(svg);
      rline(svg, px(0),py(13), px(16),py(13), '0s', '3.0s');
      const ft=svgEl('text',{x:px(8),y:Y0+H+88,'text-anchor':'middle','dominant-baseline':'central',
        'font-size':15,'font-weight':700,'fill':'#1a1a18','font-family':FF});
      ft.textContent='完成 — ドッジボールコート（半面）';
      ft.style.cssText='animation:popIn .3s ease both;animation-delay:0.65s';
      svg.appendChild(ft);
    }
  }
];

const svg=document.getElementById('stage');
const titleEl=document.getElementById('step-title');
const descEl=document.getElementById('step-desc');
const btnPrev=document.getElementById('btnPrev');
const btnNext=document.getElementById('btnNext');
const counter=document.getElementById('step-counter');
const dotsEl=document.getElementById('dots');
svg.setAttribute('viewBox',`0 0 ${VW} ${VH}`);

let cur=0;
function buildDots(){
  dotsEl.innerHTML='';
  steps.forEach((_,i)=>{
    const d=document.createElement('span');
    d.className='dot'+(i===cur?' active':'');
    dotsEl.appendChild(d);
  });
}
function render(){
  const s=steps[cur];
  titleEl.textContent=s.title;
  descEl.textContent=s.desc;
  s.draw(svg);
  btnPrev.disabled=cur===0;
  btnNext.disabled=cur===steps.length-1;
  counter.textContent=`${cur+1} / ${steps.length}`;
  buildDots();
}
btnPrev.onclick=()=>{ if(cur>0){cur--;render();} };
btnNext.onclick=()=>{ if(cur<steps.length-1){cur++;render();} };
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();if(cur<steps.length-1){cur++;render();}}
  if(e.key==='ArrowLeft'){e.preventDefault();if(cur>0){cur--;render();}}
});
let tx=0;
document.addEventListener('touchstart',e=>{ tx=e.touches[0].clientX; },{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>50){
    if(dx<0&&cur<steps.length-1){cur++;render();}
    if(dx>0&&cur>0){cur--;render();}
  }
},{passive:true});
render();
</script>
</body>
</html>
